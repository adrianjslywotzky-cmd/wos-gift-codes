<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOS Gift Code Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04080f; --surface: #0b1420; --border: #162030;
      --ice: #7dd3fc; --ice2: #bae6fd; --frost: #38bdf8;
      --gold: #fbbf24; --red: #f87171; --green: #4ade80;
      --text: #dde8f4; --muted: #4a6880;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .snow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .flake { position: absolute; top: -16px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e0f2fe, #7dd3fc33); animation: fall linear infinite; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    .app { position: relative; z-index: 1; min-height: 100vh; background: radial-gradient(ellipse at 50% -6%, rgba(56,189,248,.1) 0%, transparent 50%); }
    .header { text-align: center; padding: 52px 20px 24px; }
    .header::after { content: ''; display: block; width: 160px; height: 1px; background: linear-gradient(90deg, transparent, var(--frost), transparent); margin: 18px auto 0; }
    .game-name { font-size: .6rem; letter-spacing: .44em; text-transform: uppercase; color: var(--frost); margin-bottom: 8px; opacity: .6; }
    .title { font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 4.5vw, 2.8rem); font-weight: 900; color: var(--ice2); text-shadow: 0 0 30px rgba(125,211,252,.45); }
    .title em { color: var(--gold); font-style: normal; }
    .meta { text-align: center; margin-bottom: 10px; font-size: .68rem; color: var(--muted); }
    .meta span { color: var(--ice); }
    .redeem { text-align: center; margin-bottom: 24px; }
    .redeem a { display: inline-flex; align-items: center; gap: 6px; background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.3); color: var(--gold); font-size: .76rem; padding: 7px 18px; border-radius: 5px; text-decoration: none; transition: all .2s; }
    .redeem a:hover { background: rgba(251,191,36,.18); }
    .main { max-width: 940px; margin: 0 auto; padding: 0 20px 64px; }
    .count { text-align: center; margin-bottom: 20px; font-size: .74rem; color: var(--muted); }
    .count strong { color: var(--ice); font-size: .9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(282px, 1fr)); gap: 14px; }
    .card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: up .42s ease both; transition: border-color .22s, transform .18s; }
    .card:hover { border-color: rgba(56,189,248,.3); transform: translateY(-3px); }
    .card-top { position: absolute; inset: 0 0 auto 0; height: 1px; background: linear-gradient(90deg, transparent, var(--frost), transparent); opacity: 0; transition: opacity .3s; }
    .card:hover .card-top { opacity: 1; }
    @keyframes up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .new-badge { position: absolute; top: 11px; right: 11px; background: var(--gold); color: #040a10; font-size: .54rem; font-weight: 700; letter-spacing: .13em; padding: 2px 8px; border-radius: 2px; }
    .card-body { padding: 20px 20px 16px; }
    .code-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .code { font-family: 'Courier New', monospace; font-size: 1.02rem; font-weight: 700; color: var(--ice2); letter-spacing: .06em; word-break: break-all; }
    .copy-btn { background: rgba(56,189,248,.09); border: 1px solid rgba(56,189,248,.22); color: var(--frost); font-size: .7rem; padding: 5px 13px; border-radius: 3px; cursor: pointer; white-space: nowrap; transition: all .18s; font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0; }
    .copy-btn:hover { background: rgba(56,189,248,.18); }
    .copy-btn.ok { background: rgba(74,222,128,.13); border-color: rgba(74,222,128,.32); color: var(--green); }
    .rewards { font-size: .8rem; color: var(--gold); margin-bottom: 10px; line-height: 1.6; }
    .deadline { font-size: .7rem; color: #67e8f9; background: rgba(6,182,212,.09); display: inline-block; padding: 2px 9px; border-radius: 3px; border: 1px solid rgba(6,182,212,.16); margin-bottom: 6px; }
    .note { font-size: .71rem; color: var(--muted); line-height: 1.5; }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="snow" id="snow"></div>
  <div class="app">
    <header class="header">
      <p class="game-name">Whiteout Survival</p>
      <h1 class="title">GIFT <em>CODE</em> TRACKER</h1>
    </header>
    <p class="meta">最終更新: <span id="updated">-</span></p>
    <div class="redeem">
      <a href="https://wos-giftcode.centurygame.com" target="_blank" rel="noopener noreferrer">🎁 コード交換所を開く</a>
    </div>
    <main class="main">
      <p class="count" id="count"></p>
      <div class="grid" id="grid"><p class="empty">読み込み中...</p></div>
    </main>
  </div>
  <script>
    const snow = document.getElementById('snow');
    for (let i = 0; i < 22; i++) {
      const f = document.createElement('div');
      f.className = 'flake';
      const size = (5 + (i * 1.1) % 11) + 'px';
      f.style.cssText = `left:${(i*41+7)%100}%;width:${size};height:${size};opacity:${0.06+(i%6)*0.035};animation-delay:${(i*1.17)%8}s;animation-duration:${7+(i*0.8)%7}s`;
      snow.appendChild(f);
    }
    async function load() {
      try {
        const res = await fetch('codes.json?t=' + Date.now());
        const data = await res.json();
        render(data);
      } catch {
        document.getElementById('grid').innerHTML = '<p class="empty">データを読み込めませんでした</p>';
      }
    }
    function render(data) {
      document.getElementById('updated').textContent = data.updated || '-';
      const codes = (data.codes || []).filter(c => !c.deadline || new Date(c.deadline).getTime() > Date.now());
      document.getElementById('count').innerHTML = `現在 <strong>${codes.length}件</strong> のアクティブコード`;
      if (!codes.length) {
        document.getElementById('grid').innerHTML = '<p class="empty">🧊 現在有効なコードはありません</p>';
        return;
      }
      document.getElementById('grid').innerHTML = codes.map((c, i) => `
        <div class="card" style="animation-delay:${i*0.07}s">
          <div class="card-top"></div>
          ${i === 0 ? '<span class="new-badge">NEW</span>' : ''}
          <div class="card-body">
            <div class="code-row">
              <span class="code">${c.code}</span>
              <button class="copy-btn" onclick="copy(this,'${c.code}')">コピー</button>
            </div>
            <p class="rewards">${c.rewards}</p>
            ${c.deadline ? `<span class="deadline">⏳ ${new Date(c.deadline).toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'})} JSTまで</span>` : ''}
            ${c.note ? `<p class="note">📌 ${c.note}</p>` : ''}
          </div>
        </div>
      `).join('');
    }
    function copy(btn, code) {
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✓ コピー済';
        btn.classList.add('ok');
        setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('ok'); }, 2000);
      });
    }
    load();
  </script>
</body>
</html>
